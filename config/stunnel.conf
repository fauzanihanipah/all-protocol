; Stunnel - SSH SSL backend.
; Public reachable on 443 via Nginx stream multiplexer (no/other SNI -> here),
; and on 777 directly (no multiplex).

cert    = /etc/stunnel/stunnel.pem
client  = no
pid     = /var/run/stunnel.pid
output  = /var/log/stunnel.log
debug   = 4

; Mobile injectors (HTTP Injector, KPN, Netmod, eProxy) butuh TLS 1.0/1.1
; dan cipher legacy (aes128-cbc, sha1). Ubuntu 22.04 / Debian 12 default
; OpenSSL policy MinProtocol=TLSv1.2 + SECLEVEL=2 yang akan reject mereka
; dengan "unsupported protocol" / "no shared cipher". Override:
sslVersionMin       = TLSv1
ciphers             = DEFAULT@SECLEVEL=0
ciphersuites        = TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256
securityLevel       = 0
options             = NO_SSLv2
options             = NO_SSLv3

; Konek ke Dropbear (bukan OpenSSH) — mobile injector pakai cipher legacy
; (aes128-cbc / arcfour / 3des-cbc) yang sudah di-disable OpenSSH modern.
; Dropbear menerima cipher tersebut by default.
[ssh-ssl-backend]
accept  = 127.0.0.1:7443
connect = 127.0.0.1:109

[ssh-ssl-public]
accept  = 0.0.0.0:777
connect = 127.0.0.1:109

; Stunnel - SSH SSL backend.
; Public reachable on 443 via Nginx stream multiplexer (no/other SNI -> here),
; and on 777 directly (no multiplex).

cert    = /etc/stunnel/stunnel.pem
client  = no
pid     = /var/run/stunnel.pid
output  = /var/log/stunnel.log
debug   = 4

; Modern stunnel: 'sslVersion = all' is deprecated/rejected.
; Allow TLS 1.0+ for max compatibility with mobile injectors.
sslVersionMin = TLSv1
ciphers       = HIGH:!aNULL:!MD5

[ssh-ssl-backend]
accept  = 127.0.0.1:7443
connect = 127.0.0.1:22

[ssh-ssl-public]
accept  = 0.0.0.0:777
connect = 127.0.0.1:22

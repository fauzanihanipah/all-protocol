user www-data;
worker_processes auto;
pid /run/nginx.pid;

# Load dynamic modules (libnginx-mod-stream lands here on Debian/Ubuntu)
include /etc/nginx/modules-enabled/*.conf;

events { worker_connections 4096; multi_accept on; }

# ---------- HTTP context: HTTP:80 + internal HTTPS:8443 ----------
http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 16m;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;

    # vhost lives in conf.d
    include /etc/nginx/conf.d/*.conf;
}

# ---------- STREAM context: 443 SNI multiplexer ----------
# Routes by TLS SNI:
#   SNI = our domain  -> Nginx HTTPS (V2Ray, SSH-WS-TLS, Trojan) at 127.0.0.1:8443
#   no/other SNI      -> Stunnel (SSH-SSL pure) at 127.0.0.1:7443
stream {
    log_format basic '$remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received $session_time "$ssl_preread_server_name"';
    access_log /var/log/nginx/stream.log basic;

    map $ssl_preread_server_name $upstream_443 {
        default               ssh_ssl_backend;
        ~.*                   tls_backend;
    }

    upstream tls_backend       { server 127.0.0.1:8443; }
    upstream ssh_ssl_backend   { server 127.0.0.1:7443; }

    server {
        listen 443 reuseport;
        listen [::]:443 reuseport;
        proxy_pass $upstream_443;
        ssl_preread on;
        proxy_protocol off;
        proxy_timeout 300s;
    }
}

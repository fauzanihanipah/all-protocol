# ===== HTTP :80 (SSH-WS Non-TLS + V2Ray Non-TLS) =====
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name __DOMAIN__;

    # Default: kalau request adalah WebSocket upgrade -> belokin ke @ws
    # (lewat error_page trik karena 'if + proxy_pass' nggak reliable di nginx).
    # Kalau bukan, balas halaman placeholder kecil.
    location / {
        if ($http_upgrade = "websocket") { return 418; }
        return 200 "OK\n";
        default_type text/plain;
    }

    # Path eksplisit yg sering dipakai HTTP Injector / KPN preset
    location = /ssh-ws { error_page 418 = @ws; return 418; }
    location = /ws     { error_page 418 = @ws; return 418; }
    location = /websocket { error_page 418 = @ws; return 418; }

    # SSH WebSocket -> Dropbear via local ws proxy on 127.0.0.1:8880
    location @ws {
        proxy_pass http://127.0.0.1:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }
    error_page 418 = @ws;

    # VMess WS (non-TLS)
    location /vmess {
        if ($http_upgrade != "websocket") { return 404; }
        proxy_pass http://127.0.0.1:10000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 7200s;
    }

    # VLess WS (non-TLS)
    location /vless {
        if ($http_upgrade != "websocket") { return 404; }
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 7200s;
    }
}

# ===== HTTPS internal :8443 (di-front oleh Nginx stream :443) =====
server {
    listen 127.0.0.1:8443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate     /etc/xray/xray.crt;
    ssl_certificate_key /etc/xray/xray.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Default: WS-upgrade -> ws-py, kalau bukan -> halaman placeholder
    location / {
        if ($http_upgrade = "websocket") { return 418; }
        return 200 "Welcome\n";
        default_type text/plain;
    }

    # Path eksplisit untuk klien yg butuh path tertentu
    location = /ssh-ws { error_page 418 = @ws; return 418; }
    location = /ws     { error_page 418 = @ws; return 418; }
    location = /websocket { error_page 418 = @ws; return 418; }

    # SSH WebSocket TLS -> Dropbear via ws proxy
    location @ws {
        proxy_pass http://127.0.0.1:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }
    error_page 418 = @ws;

    # VMess WS (TLS)
    location /vmess {
        if ($http_upgrade != "websocket") { return 404; }
        proxy_pass http://127.0.0.1:10000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 7200s;
    }

    # VLess WS (TLS)
    location /vless {
        if ($http_upgrade != "websocket") { return 404; }
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 7200s;
    }

    # Trojan WS (TLS)
    location /trojan-ws {
        if ($http_upgrade != "websocket") { return 404; }
        proxy_pass http://127.0.0.1:10002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 7200s;
    }

    # gRPC services
    location ^~ /vmess-grpc  { grpc_pass grpc://127.0.0.1:10003; grpc_set_header Host $host; }
    location ^~ /vless-grpc  { grpc_pass grpc://127.0.0.1:10004; grpc_set_header Host $host; }
    location ^~ /trojan-grpc { grpc_pass grpc://127.0.0.1:10005; grpc_set_header Host $host; }
}
